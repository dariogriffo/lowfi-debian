name: Build lowfi for Debian

on:
  workflow_dispatch:
    inputs:
      lowfi_version:
        description: The version of lowfi to build.
        type: string
        required: true
      build_version:
        description: The build version.
        type: string
        required: true

permissions:
  contents: write

jobs:
  build-lowfi:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lowfi-debian
        uses: actions/checkout@v4

      - name: Build lowfi
        run: ./build.sh ${{ inputs.lowfi_version }} ${{ inputs.build_version }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: lowfi_*.deb

  build-src:
    name: Build Source Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lowfi-debian
        uses: actions/checkout@v4

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev devscripts wget ca-certificates

      - name: Build source packages
        run: ./build_src.sh ${{ inputs.lowfi_version }} ${{ inputs.build_version }}

      - name: Upload Source Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: |
            lowfi_*.dsc
            lowfi_*.orig.tar.gz
            lowfi_*.debian.tar.xz

  release-lowfi:
    name: Release lowfi for Debian
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-lowfi, build-src]
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Download Source Artifacts
        uses: actions/download-artifact@v4
        with:
          name: source-artifact

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            lowfi_*.deb
            lowfi_*.dsc
            lowfi_*.orig.tar.gz
            lowfi_*.debian.tar.xz
          name: ${{ inputs.lowfi_version }}+${{ inputs.build_version }}
          tag_name: ${{ inputs.lowfi_version }}+${{ inputs.build_version }}
          fail_on_unmatched_files: true
